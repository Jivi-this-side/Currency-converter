<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🪙 Currency converter</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css" />

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.158.0/examples/jsm/",
        "lenis":"https://unpkg.com/lenis@1.3.4/dist/lenis.min.js"
      }
    }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
  <script src="https://unpkg.com/lenis@1.3.4/dist/lenis.min.js"></script>
</head>
<body>

  <canvas id="webgl"></canvas>

  <section class="hero">
    <div class="glass-card">
      <h1>Currency<br><span class="italic-serif">converter</span></h1>
      <p class="subtitle">Converting currencies harder than Wall Street..</p>
      
      <div class="input-group">
        <input type="number" id="amount" value="1000" />
        <select id="currency">
          <option value="INR">INR (₹)</option>
          <option value="USD">USD ($)</option>
          <option value="EUR">EUR (€)</option>
          <option value="JPY">JPY (¥)</option>
        </select>
      </div>
      <button id="startBtn">Convert</button>

      <div class="ai-insights-panel" id="aiInsights">
        <div class="ai-header">
          <span class="ai-badge">INSIGHTS </span>
          <span class="trend-status" id="trendBadge">Analyzing...</span>
        </div>
        <p class="insight-text" id="insightText">Initiate conversion to map trend metrics...</p>
        
        <div class="chart-container">
          <canvas id="sparklineCanvas"></canvas>
        </div>
        <div class="chart-labels">
          <span>7 Days Ago</span>
          <span>Today</span>
        </div>
      </div>

    </div>
  </section>

  <section class="panel left-align" id="panel1">
    <div class="meta-num">01</div>
    <div class="content-wrapper">
      <span class="stage-label" id="tc1"></span>
      <div class="reveal-mask">
        <h2 id="cardText1">---</h2>
      </div>
    </div>
  </section>

  <section class="panel right-align" id="panel2">
    <div class="meta-num">02</div>
    <div class="content-wrapper">
      <span class="stage-label" id="tc2"> </span>
      <div class="reveal-mask">
        <h2 id="cardText2">---</h2>
      </div>
    </div>
  </section>

  <section class="panel left-align" id="panel3">
    <div class="meta-num">03</div>
    <div class="content-wrapper">
      <span class="stage-label" id="tc3"></span>
      <div class="reveal-mask">
        <h2 id="cardText3">---</h2>
      </div>
    </div>
  </section>

  <section class="panel right-align" id="panel4">
    <div class="meta-num">04</div>
    <div class="content-wrapper">
      <span class="stage-label" id="tc4"></span>
      <div class="reveal-mask">
        <h2 id="cardText4">---</h2>
      </div>
    </div>
  </section>

  <script type="module" src="app.js"></script>
</body>
</html>
